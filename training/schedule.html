<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BNI 코리아 | Schedule — 2026년 6월</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="../shared/brand.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:'Pretendard',sans-serif;color:#3c4043;background:#fff;-webkit-font-smoothing:antialiased;}
  .material-symbols-outlined{font-size:22px;}
  .ic-btn{width:40px;height:40px;border-radius:9999px;display:grid;place-items:center;color:#5f6368;cursor:pointer;transition:.15s;}
  .ic-btn:hover{background:#f1f3f4;}

  /* layout */
  .app{display:flex;flex-direction:column;height:100vh;}
  .topbar{display:flex;align-items:center;gap:8px;height:64px;padding:0 12px;border-bottom:1px solid #e0e0e0;flex-shrink:0;}
  .main{display:flex;flex:1;min-height:0;}
  .side{width:256px;flex-shrink:0;padding:8px 8px 12px;overflow-y:auto;display:flex;flex-direction:column;}
  .cal{flex:1;display:flex;flex-direction:column;min-width:0;}

  /* top bar */
  .today-btn{border:1px solid #dadce0;border-radius:8px;padding:8px 18px;font-size:14px;font-weight:600;color:#3c4043;background:#fff;cursor:pointer;}
  .today-btn:hover{background:#f8f9fa;}
  .view-btn{display:flex;align-items:center;gap:4px;border:1px solid #dadce0;border-radius:8px;padding:7px 12px;font-size:14px;font-weight:600;color:#3c4043;cursor:pointer;}
  .view-btn:hover{background:#f8f9fa;}
  .logo-cal{width:32px;height:32px;position:relative;}

  /* create button */
  .create{display:inline-flex;align-items:center;gap:14px;padding:10px 22px 10px 14px;border-radius:16px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.16),0 1px 2px rgba(0,0,0,.1);font-size:14px;font-weight:600;color:#3c4043;cursor:pointer;margin:8px 0 16px;}
  .create:hover{box-shadow:0 1px 3px rgba(0,0,0,.3);background:#f8fafe;}

  /* mini calendar */
  .mini{font-size:12px;}
  .mini-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 6px;}
  .mini-grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .mini-grid span,.mini-grid button{text-align:center;font-size:11px;line-height:24px;}
  .mini-grid .dow{color:#70757a;}
  .mini-grid button{border:none;background:none;border-radius:50%;width:24px;height:24px;margin:1px auto;cursor:pointer;color:#3c4043;}
  .mini-grid button:hover{background:#f1f3f4;}
  .mini-grid button.today{background:#1a73e8;color:#fff;}
  .mini-grid button.muted{color:#bdc1c6;}

  /* calendar list */
  .cal-list{margin-top:14px;}
  .cal-list h3{font-size:14px;font-weight:600;color:#3c4043;padding:6px 8px;display:flex;align-items:center;justify-content:space-between;}
  .cal-item{display:flex;align-items:center;gap:12px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:14px;}
  .cal-item:hover{background:#f1f3f4;}
  .cbx{width:16px;height:16px;border-radius:3px;flex-shrink:0;display:grid;place-items:center;}
  .cbx .material-symbols-outlined{font-size:14px;color:#fff;}

  /* ad video banner (replaces 내 캘린더) */
  .ad-banner{display:block;position:relative;border-radius:14px;overflow:hidden;margin:16px 4px 0;flex:1;min-height:240px;text-decoration:none;box-shadow:0 2px 12px rgba(0,0,0,.14);}
  .ad-banner video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;}
  .ad-banner:hover video{transform:scale(1.05);}
  .ad-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.15) 55%,rgba(0,0,0,.25));display:flex;flex-direction:column;justify-content:flex-end;padding:16px;}
  .ad-tag{font-size:10px;font-weight:700;letter-spacing:.06em;color:#fff;background:rgba(255,255,255,.22);align-self:flex-start;padding:3px 8px;border-radius:5px;}
  .ad-title{font-size:20px;font-weight:800;color:#fff;line-height:1.22;margin:10px 0 0;text-shadow:0 1px 4px rgba(0,0,0,.3);}
  .ad-cta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(90deg,#cf2030,#9a0d1a);align-self:flex-start;padding:7px 14px;border-radius:9999px;margin-top:12px;}

  /* calendar grid */
  .dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #e0e0e0;flex-shrink:0;}
  .dow-row>div{text-align:center;font-size:11px;font-weight:600;color:#70757a;padding:6px 0 8px;letter-spacing:.5px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);flex:1;min-height:0;}
  .cell{border-right:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;padding:2px 6px 4px;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
  .cell .dnum{font-size:12px;font-weight:600;color:#3c4043;text-align:center;width:24px;height:24px;line-height:24px;border-radius:50%;margin:2px auto 2px;align-self:center;}
  .cell.muted{background:#fafafa;}
  .cell.muted .dnum{color:#bdc1c6;}
  .cell .dnum.today{background:#1a73e8;color:#fff;}
  .cell .sun{color:#d93025;} .cell .sat{color:#1a73e8;}
  .evs{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
  .ev{font-size:11px;line-height:1.4;padding:1px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;}
  .ev.dotstyle{background:transparent!important;color:#3c4043!important;display:flex;align-items:center;gap:6px;padding-left:2px;}
  .ev.dotstyle .d{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  /* event colors (soft) */
  .c-gray{background:#e8eaed;color:#3c4043;} .c-gray .d{background:#616161;}
  .c-red{background:#fad2cf;color:#a50e0e;} .c-red .d{background:#d50000;}
  .c-blue{background:#d2e3fc;color:#1967d2;} .c-blue .d{background:#039be5;}
  .c-green{background:#d4edda;color:#137333;} .c-green .d{background:#0b8043;}
  .c-purple{background:#ecdcfb;color:#8430ce;} .c-purple .d{background:#8e24aa;}
  /* solid (conferences) */
  .c-mag{background:#c2185b;color:#fff;} .c-navy{background:#3f51b5;color:#fff;} .c-teal{background:#00897b;color:#fff;}

  .more{font-size:11px;color:#70757a;padding:1px 4px;cursor:pointer;}
  .more:hover{text-decoration:underline;}
  .cell.sel{box-shadow:inset 0 0 0 2px #1a73e8;background:#e8f0fe;}

  /* Selected Day Training */
  .sdwrap{max-width:1200px;margin:0 auto;padding:0 24px;}
  .sdcard{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.07);overflow:hidden;transition:.2s;}
  .sdcard:hover{box-shadow:0 12px 30px rgba(0,0,0,.12);transform:translateY(-3px);}
  .sd-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;}
  .sd-apply{display:block;width:100%;text-align:center;background:linear-gradient(90deg,#cf2030,#9a0d1a);color:#fff;font-weight:700;padding:11px;border-radius:9999px;margin-top:16px;text-decoration:none;letter-spacing:.03em;}

  /* 트레이닝 바로가기 shortcuts */
  .shortcuts{width:100%;display:grid;grid-template-columns:repeat(6,1fr);}
  .shortcut{padding:38px 12px;text-align:center;border-right:1px solid #ededed;text-decoration:none;transition:.2s;}
  .shortcut:last-child{border-right:none;}
  .shortcut:hover{background:#fafafa;}
  .shortcut .l1{font-size:clamp(18px,1.7vw,26px);font-weight:800;color:#3c4043;line-height:1.15;letter-spacing:-.01em;}
  .shortcut .l1 b{color:#cf2030;}
  .shortcut .l2{font-size:clamp(13px,1.2vw,18px);font-weight:700;color:#3c4043;margin-top:8px;}
  .shortcut .arrow{display:inline-block;margin-top:14px;color:#cf2030;font-weight:700;font-size:13px;opacity:0;transition:.2s;}
  .shortcut:hover .arrow{opacity:1;}
  /* 좁은 화면에서는 한 줄이 너무 빽빽하므로 단계적으로 줄임 */
  @media (max-width:980px){ .shortcuts{grid-template-columns:repeat(3,1fr);} .shortcut{border-bottom:1px solid #ededed;} .shortcut:nth-child(3n){border-right:none;} .shortcut:nth-last-child(-n+3){border-bottom:none;} }
  @media (max-width:600px){ .shortcuts{grid-template-columns:repeat(2,1fr);} .shortcut:nth-child(3n){border-right:1px solid #ededed;} .shortcut:nth-child(2n){border-right:none;} .shortcut:nth-last-child(-n+2){border-bottom:none;} }

  @media (max-width:820px){ .side{display:none;} .cal{border-left:none;} .app{height:auto;min-height:60vh;} .grid,.week-wrap,.day-view{min-height:60vh;} }

  /* ===== view dropdown (월/주/일) ===== */
  .view-wrap{position:relative;}
  .view-menu{position:absolute;top:46px;right:0;background:#fff;border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.18);padding:6px;display:none;z-index:60;min-width:130px;}
  .view-menu.open{display:block;}
  .view-menu button{display:block;width:100%;text-align:left;padding:9px 14px;border:none;background:none;font-size:14px;font-weight:600;color:#3c4043;border-radius:7px;cursor:pointer;}
  .view-menu button:hover{background:#f1f3f4;}
  .view-menu button.active{color:#cf2030;}

  /* ===== week view ===== */
  .week-wrap{flex:1;display:flex;flex-direction:column;min-height:0;}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0;}
  .week-col{border-right:1px solid #e0e0e0;display:flex;flex-direction:column;min-height:0;}
  .week-col:last-child{border-right:none;}
  .week-col.muted{background:#fafafa;}
  .wch{padding:10px 0 12px;text-align:center;border-bottom:1px solid #e0e0e0;flex-shrink:0;cursor:pointer;}
  .wch .wd{font-size:11px;font-weight:600;color:#70757a;letter-spacing:.4px;}
  .wch .wn{font-size:22px;font-weight:700;color:#3c4043;width:40px;height:40px;line-height:40px;border-radius:50%;margin:4px auto 0;}
  .wch .wn.today{background:#1a73e8;color:#fff;}
  .wch.sun .wn{color:#d93025;} .wch.sat .wn{color:#1a73e8;}
  .wch.sun .wn.today,.wch.sat .wn.today{color:#fff;}
  .week-evs{flex:1;overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:5px;}
  .week-evs .ev{white-space:normal;line-height:1.35;padding:5px 8px;}
  .week-empty{color:#bdc1c6;font-size:12px;text-align:center;padding:12px 0;}

  /* ===== day view ===== */
  .day-view{flex:1;overflow-y:auto;padding:28px 20px;}
  .day-inner{max-width:780px;margin:0 auto;}
  .day-title{font-size:22px;font-weight:800;color:#202124;margin:0 0 18px;}
  .day-ev{display:flex;gap:14px;align-items:stretch;padding:16px;border:1px solid #ececec;border-radius:14px;margin-bottom:12px;transition:.15s;}
  .day-ev:hover{box-shadow:0 6px 18px rgba(0,0,0,.08);}
  .day-ev .dtime{flex-shrink:0;width:118px;font-size:14px;font-weight:700;color:#3c4043;}
  .day-ev .dtime span{display:block;font-size:12px;font-weight:500;color:#70757a;}
  .day-ev .dbar{width:4px;border-radius:4px;background:#cf2030;flex-shrink:0;}
  .day-ev .dbody h4{margin:0;font-size:16px;font-weight:700;color:#202124;line-height:1.35;}
  .day-ev .dbody p{margin:4px 0 0;font-size:13px;color:#5f6368;}
  .day-empty{text-align:center;color:#70757a;padding:60px 0;}
  .day-empty p:first-child{font-size:18px;font-weight:700;margin:0 0 4px;color:#3c4043;}

  /* ===== Selected Day Training — 중앙 팝업 + 회전 캐러셀 ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-card{background:#fff;border-radius:20px;width:min(420px,100%);max-height:92vh;overflow-y:auto;padding:22px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border:none;background:#f1f3f4;border-radius:50%;font-size:20px;line-height:1;cursor:pointer;color:#5f6368;z-index:20;}
  .modal-close:hover{background:#e8eaed;}
  .modal-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#c2185b;font-weight:700;margin:0;}
  .modal-card h2{font-size:20px;font-weight:800;margin:6px 0 16px;color:#202124;}
  .carousel{position:relative;perspective:1400px;}
  .car-card{transition:transform .28s ease, opacity .28s ease;transform-style:preserve-3d;backface-visibility:hidden;}
  .carousel .sdcard:hover{transform:none;box-shadow:0 4px 20px rgba(0,0,0,.07);}
  .car-nav{position:absolute;top:42%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.95);box-shadow:0 2px 10px rgba(0,0,0,.22);font-size:22px;line-height:1;color:#3c4043;cursor:pointer;z-index:15;display:grid;place-items:center;}
  .car-nav.prev{left:4px;} .car-nav.next{right:4px;}
  .car-nav:hover{background:#fff;}
  .car-dots{display:flex;justify-content:center;gap:7px;margin-top:16px;}
  .car-dots .dot{width:8px;height:8px;border-radius:50%;background:#dadce0;cursor:pointer;transition:.2s;}
  .car-dots .dot.active{background:#cf2030;width:22px;border-radius:4px;}
</style>
</head>

    26:[["BNI Taiwan National Conference","c-mag"]],
    29:[["월말 결산 미팅","c-green"]],
    30:[["대표 면담","c-gray"],["7월 일정 준비","c-navy"]],
  };

  // ---- render main grid ----
  const grid=document.getElementById('grid');
  cells.forEach((c,idx)=>{
    const isSun=idx%7===0, isSat=idx%7===6;
    const cell=document.createElement('div');
    cell.className='cell'+(c.muted?' muted':'');
    const numCls=(!c.muted&&c.d===TODAY)?'today':(isSun?'sun':(isSat?'sat':''));
    const label=c.sub?`<span style="font-size:11px;color:#70757a;margin-right:3px">${c.sub}</span>`:'';
    let html=`<div style="display:flex;justify-content:center;align-items:center;gap:2px;">${label}<span class="dnum ${numCls}">${c.d}</span></div><div class="evs">`;
    if(!c.muted && EV[c.d]){
      const list=EV[c.d];
      list.slice(0,3).forEach(([t,cls])=>{
        if(cls.includes('dotstyle')) html+=`<div class="ev ${cls}"><span class="d"></span><span style="overflow:hidden;text-overflow:ellipsis">${t}</span></div>`;
        else html+=`<div class="ev ${cls}">${t}</div>`;
      });
      if(list.length>3) html+=`<div class="more">+${list.length-3}개 더보기</div>`;
    }
    html+=`</div>`;
    cell.innerHTML=html;
    grid.appendChild(cell);
  });

  // ---- Selected Day Training (detailed) ----
  const details={
    1:[{t:"마포 챕터 미팅",chapter:"마포 챕터",who:"김지훈 디렉터",time:"07:00 – 09:00",status:"모집중",img:"photo-1517245386807-bb43f82c33c4"}],
    2:[{t:"영등포 1:1 미팅",chapter:"영등포 챕터",who:"박서연 트레이너",time:"14:00 – 15:30",status:"모집중",img:"photo-1600880292203-757bb62b4baf"},
       {t:"서초 오리엔테이션",chapter:"서초 챕터",who:"이정민 디렉터",time:"19:00 – 21:00",status:"모집중",img:"photo-1573164713988-8665fc963095"}],
    4:[{t:"수원1 멤버데이",chapter:"수원1 챕터",who:"정하늘 디렉터",time:"07:00 – 09:00",status:"모집중",img:"photo-1559136555-9303baea8ebd"}],
    8:[{t:"리더십 트레이닝",chapter:"코리아 본부",who:"최우진 대표 트레이너",time:"10:00 – 13:00",status:"모집중",img:"photo-1542744094-3a31f272c490"}],
    9:[{t:"마포 멤버 트레이닝",chapter:"마포 챕터",who:"김지훈 디렉터",time:"07:00 – 09:00",status:"진행중",img:"photo-1556761175-5973dc0f32e7"},
       {t:"영등포 미팅",chapter:"영등포 챕터",who:"박서연 트레이너",time:"14:00 – 15:30",status:"모집중",img:"photo-1521737604893-d14cc237f11d"}],
    11:[{t:"네트워킹 세미나",chapter:"코리아 본부",who:"한지윤 매니저",time:"18:30 – 20:30",status:"모집중",img:"photo-1551836022-d5d88e9218df"}],
    15:[{t:"챕터 합동 트레이닝",chapter:"합동 4개 챕터",who:"최우진 대표 트레이너",time:"09:00 – 12:00",status:"모집중",img:"photo-1552664730-d307ca884978"}],
    16:[{t:"신규 멤버 교육",chapter:"마포 챕터",who:"김지훈 디렉터",time:"19:00 – 21:00",status:"모집중",img:"photo-1517048676732-d65bc937f952"}],
    18:[{t:"비즈니스 발표회",chapter:"서초 챕터",who:"이정민 디렉터",time:"14:00 – 16:00",status:"모집중",img:"photo-1475721027785-f74eccf877e2"}],
    22:[{t:"서초 챕터 미팅",chapter:"서초 챕터",who:"이정민 디렉터",time:"07:00 – 09:00",status:"모집중",img:"photo-1591115765373-5207764f72e7"}],
    23:[{t:"리더 워크숍",chapter:"코리아 본부",who:"최우진 대표 트레이너",time:"10:00 – 13:00",status:"모집중",img:"photo-1454165804606-c3d57bc86b40"}],
    25:[{t:"수원1 멤버 트레이닝",chapter:"수원1 챕터",who:"정하늘 디렉터",time:"07:00 – 09:00",status:"모집중",img:"photo-1556157382-97eda2d62296"}],
    29:[{t:"월말 결산 미팅",chapter:"코리아 본부",who:"한지윤 매니저",time:"18:00 – 20:00",status:"마감임박",img:"photo-1517502884422-41eaead166d4"}],
  };
  const dow=['일','월','화','수','목','금','토'];
  const stColor={"진행중":"background:#fad2cf;color:#a50e0e","마감임박":"background:#202124;color:#fff","모집중":"border:1px solid #dadce0;color:#5f6368"};
  const modal=document.getElementById('dayModal');
  const modalLabel=document.getElementById('selectedDateLabel');
  const carStage=document.getElementById('carStage');
  const carPrev=document.getElementById('carPrev');
  const carNext=document.getElementById('carNext');
  const carDots=document.getElementById('carDots');
  let curList=[], curIdx=0, animating=false;

  function cardHTML(e){
    return `<div class="sdcard">
      <img style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block" loading="lazy" src="https://images.unsplash.com/${e.img}?auto=format&fit=crop&w=520&h=390&q=80" alt=""/>
      <div style="padding:18px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span class="sd-badge" style="background:#fdebed;color:#c2185b;">${e.chapter}</span>
          <span class="sd-badge" style="${stColor[e.status]||stColor['모집중']}">${e.status}</span>
        </div>
        <h3 style="font-size:17px;font-weight:800;margin:0;color:#202124;line-height:1.35;">${e.t}</h3>
        <p style="font-size:13px;color:#5f6368;margin:10px 0 2px;">👤 ${e.who}</p>
        <p style="font-size:13px;color:#5f6368;margin:0;">🕒 ${e.time}</p>
        <a href="#" class="sd-apply">신청하기</a>
      </div>
    </div>`;
  }
  function emptyHTML(){
    return `<div class="sdcard" style="padding:48px 24px;text-align:center;">
      <p style="font-size:18px;font-weight:700;margin:0 0 4px;color:#3c4043;">예정된 트레이닝이 없습니다.</p>
      <p style="font-size:14px;margin:0;color:#70757a;">다른 날짜를 선택해 주세요.</p>
    </div>`;
  }
  function renderCard(){
    const card=carStage.querySelector('.car-card');
    card.innerHTML = curList.length ? cardHTML(curList[curIdx]) : emptyHTML();
    const multi = curList.length>1;
    carPrev.style.display = multi?'':'none';
    carNext.style.display = multi?'':'none';
    carDots.innerHTML = multi ? curList.map((_,i)=>`<span class="dot ${i===curIdx?'active':''}" data-i="${i}"></span>`).join('') : '';
  }
  // 좌우 회전(rotateY) 효과로 카드 전환
  function animateTo(i,dir){
    if(animating || i===curIdx) return;
    animating=true;
    const card=carStage.querySelector('.car-card');
    card.style.transform=`rotateY(${dir>0?-90:90}deg)`;
    card.style.opacity='0';
    setTimeout(()=>{
      curIdx=i;
      card.innerHTML=cardHTML(curList[curIdx]);
      card.style.transition='none';
      card.style.transform=`rotateY(${dir>0?90:-90}deg)`;
      carDots.querySelectorAll('.dot').forEach((d,k)=>d.classList.toggle('active',k===curIdx));
      requestAnimationFrame(()=>{
        card.style.transition='';
        card.style.transform='rotateY(0deg)';
        card.style.opacity='1';
        setTimeout(()=>{ animating=false; },300);
      });
    },280);
  }
  function go(dir){ if(curList.length>1) animateTo((curIdx+dir+curList.length)%curList.length, dir); }

  function renderDetail(day,dowIdx){      // 날짜 클릭 → 모달 열기
    modalLabel.textContent=`2026년 6월 ${day}일 (${dow[dowIdx]})`;
    curList=details[day]||[]; curIdx=0; animating=false;
    const card=carStage.querySelector('.car-card');
    card.style.transition='none'; card.style.transform='rotateY(0deg)'; card.style.opacity='1';
    renderCard();
    modal.classList.add('open');
  }

  carPrev.addEventListener('click',()=>go(-1));
  carNext.addEventListener('click',()=>go(1));
  carDots.addEventListener('click',e=>{ const d=e.target.closest('.dot'); if(!d) return; const i=+d.dataset.i; if(i!==curIdx) animateTo(i, i>curIdx?1:-1); });
  function closeModal(){ modal.classList.remove('open'); }
  document.getElementById('modalClose').addEventListener('click',closeModal);
  modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });
  document.addEventListener('keydown',e=>{
    if(!modal.classList.contains('open')) return;
    if(e.key==='Escape') closeModal();
    else if(e.key==='ArrowRight') go(1);
    else if(e.key==='ArrowLeft') go(-1);
  });

  // ---- click a day → update Selected Day Training ----
  document.querySelectorAll('#grid .cell').forEach((el,idx)=>{
    const c=cells[idx];
    if(c.muted) return;
    el.addEventListener('click',()=>{
      selectedDay=c.d;
      document.querySelectorAll('#grid .cell').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      renderDetail(c.d, idx%7);
    });
  });

  // ===== View switching (월 / 주 / 일) =====
  let selectedDay = TODAY;                 // 주/일 뷰의 기준 날짜
  const dowK = ['일','월','화','수','목','금','토'];
  const periodLabel = document.getElementById('periodLabel');
  const dowRow = document.getElementById('dowRow');
  const gridEl = document.getElementById('grid');
  const weekView = document.getElementById('weekView');
  const dayView = document.getElementById('dayView');
  const viewLabel = document.getElementById('viewLabel');
  const viewBtn = document.getElementById('viewBtn');
  const viewMenu = document.getElementById('viewMenu');

  // June day d 의 cells 인덱스 (index0=5/31, index1=6/1 … index d = 6/d)
  const idxOfDay = d => cells.findIndex(c=>!c.muted && c.d===d);
  const monthOf = gi => gi===0 ? '5' : (gi>=31 ? '7' : '6');

  function evChips(day){
    const list = EV[day]||[];
    if(!list.length) return '<div class="week-empty">일정 없음</div>';
    return list.map(([t,cls])=>cls.includes('dotstyle')
      ? `<div class="ev ${cls}"><span class="d"></span><span>${t}</span></div>`
      : `<div class="ev ${cls}">${t}</div>`).join('');
  }

  function renderWeek(){
    const start = Math.floor(idxOfDay(selectedDay)/7)*7;
    const wk = cells.slice(start, start+7);
    periodLabel.textContent = `2026년 ${monthOf(start)}/${wk[0].d} – ${monthOf(start+6)}/${wk[6].d}`;
    weekView.innerHTML = '<div class="week-grid">' + wk.map((c,i)=>{
      const today = !c.muted && c.d===TODAY;
      const wd = i===0?'sun':(i===6?'sat':'');
      const body = c.muted ? '<div class="week-empty">·</div>' : evChips(c.d);
      return `<div class="week-col ${c.muted?'muted':''}">
        <div class="wch ${wd}" data-day="${c.muted?'':c.d}">
          <div class="wd">${dowK[i]}${c.sub?' · '+c.sub:''}</div>
          <div class="wn ${today?'today':''}">${c.d}</div>
        </div>
        <div class="week-evs">${body}</div>
      </div>`;
    }).join('') + '</div>';
    weekView.querySelectorAll('.wch').forEach(h=>{
      const d = h.getAttribute('data-day');
      if(d) h.addEventListener('click',()=>{ selectedDay=+d; setView('day'); });
    });
  }

  function renderDay(){
    const dowIdx = idxOfDay(selectedDay)%7;
    periodLabel.textContent = `2026년 6월 ${selectedDay}일`;
    const rich = details[selectedDay]||[];
    const ev = EV[selectedDay]||[];
    let inner = `<div class="day-inner"><h3 class="day-title">${selectedDay}일 (${dowK[dowIdx]}) 일정</h3>`;
    if(rich.length){
      inner += rich.map(e=>`
        <div class="day-ev">
          <div class="dtime">${e.time}</div>
          <div class="dbar"></div>
          <div class="dbody"><h4>${e.t}</h4><p>${e.chapter} · ${e.who}</p><p>${e.status}</p></div>
        </div>`).join('');
    } else if(ev.length){
      inner += ev.map(([t])=>`
        <div class="day-ev">
          <div class="dtime"><span>종일</span></div>
          <div class="dbar"></div>
          <div class="dbody"><h4>${t}</h4></div>
        </div>`).join('');
    } else {
      inner += '<div class="day-empty"><p>예정된 일정이 없습니다.</p><p>다른 날짜를 선택해 주세요.</p></div>';
    }
    dayView.innerHTML = inner + '</div>';
  }

  function setView(v){
    viewLabel.textContent = v==='month'?'월':(v==='week'?'주':'일');
    viewMenu.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
    const showMonth = v==='month';
    dowRow.style.display = showMonth?'':'none';
    gridEl.style.display = showMonth?'':'none';
    weekView.style.display = v==='week'?'':'none';
    dayView.style.display = v==='day'?'':'none';
    if(v==='month') periodLabel.textContent = '2026년 6월';
    if(v==='week') renderWeek();
    if(v==='day') renderDay();
    viewMenu.classList.remove('open');
  }

  viewBtn.addEventListener('click', e=>{ e.stopPropagation(); viewMenu.classList.toggle('open'); });
  viewMenu.querySelectorAll('button').forEach(b=> b.addEventListener('click',()=>setView(b.dataset.view)) );
  document.addEventListener('click', e=>{ if(!viewMenu.contains(e.target) && e.target!==viewBtn) viewMenu.classList.remove('open'); });

  setView('month');
</script>
</body></html>
