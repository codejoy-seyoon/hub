<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BNI 코리아 | News — 내셔널 오피스 공지사항</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="../shared/brand.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        red:{DEFAULT:"#e11b2b", dark:"#c0121f", soft:"#fdebed"},
        ink:"#222428", body:"#5b6168", soft:"#eef0f2", line:"#e7e8ea"
      },
      fontFamily:{ sans:["Pretendard","sans-serif"] },
      borderRadius:{ xl:"0.9rem","2xl":"1.25rem","3xl":"1.75rem" }
    }}
  }
</script>
<style>
  body{font-family:'Pretendard',sans-serif;color:#222428;background:#fff;-webkit-font-smoothing:antialiased;}
  .material-symbols-outlined{font-size:20px;vertical-align:middle;}
  .wrap{max-width:1100px;margin:0 auto;padding:0 24px;}
  /* header */
  .nav{position:sticky;top:0;z-index:50;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);}
  .nav__in{display:flex;align-items:center;gap:22px;height:70px;}
  .nav__logo{font-size:34px;font-weight:800;color:#cf2030;letter-spacing:-.03em;text-decoration:none;}
  .nav__menu{display:flex;gap:26px;margin-left:8px;}
  .nav__menu a{font-size:15px;font-weight:600;color:#3a3f46;text-decoration:none;}
  .nav__menu a:hover{color:#e11b2b;}
  .nav__menu a.active{color:#e11b2b;}
  .nav__right{margin-left:auto;display:flex;align-items:center;gap:16px;}
  .nav__login{font-size:14px;color:#222428;text-decoration:none;}
  .nav__cta{background:linear-gradient(90deg,#cf2030,#9a0d1a);color:#fff;font-size:14px;font-weight:700;padding:9px 18px;border-radius:999px;text-decoration:none;}
  @media(max-width:640px){ .nav__menu{gap:16px;} .nav__menu a{font-size:14px;} .nav__login{display:none;} }
  /* board */
  .seg{display:inline-flex;border:1px solid #e7e8ea;border-radius:999px;overflow:hidden;}
  .seg button{padding:7px 16px;font-size:13px;font-weight:700;color:#5b6168;background:#fff;border:none;cursor:pointer;}
  .seg button.on{background:#222428;color:#fff;}
  .tab{padding:8px 14px;border-radius:999px;font-size:14px;font-weight:700;color:#5b6168;cursor:pointer;border:1px solid transparent;}
  .tab.on{background:#fdebed;color:#e11b2b;}
  .tab:hover{color:#e11b2b;}
  table.board{width:100%;border-collapse:collapse;}
  table.board th{font-size:13px;color:#70757a;font-weight:700;padding:12px 10px;border-bottom:2px solid #222428;text-align:center;}
  table.board td{font-size:14px;padding:14px 10px;border-bottom:1px solid #eceef0;text-align:center;color:#5b6168;}
  table.board tr.row{cursor:pointer;}
  table.board tr.row:hover{background:#faf7f7;}
  table.board tr.pin{background:#fffafa;}
  .ttl{text-align:left!important;color:#222428;font-weight:600;}
  .ttl:hover{color:#e11b2b;}
  .btn-red{background:linear-gradient(90deg,#cf2030,#9a0d1a);color:#fff;font-weight:700;border:none;border-radius:999px;padding:10px 22px;font-size:14px;cursor:pointer;}
  .btn-line{background:#fff;color:#222428;border:1.5px solid #d6d8db;border-radius:999px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;}
  .btn-line:hover{border-color:#222428;}
  .inp{border:1.5px solid #e0e2e5;border-radius:10px;padding:10px 14px;font-size:14px;width:100%;outline:none;font-family:inherit;}
  .inp:focus{border-color:#e11b2b;}
  .cmt{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid #f0f1f2;}
  .cmt__av{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:800;color:#fff;font-size:14px;}
  .modalbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modalbg.open{display:flex;}
  .modalbox{background:#fff;border-radius:18px;width:min(560px,100%);max-height:92vh;overflow-y:auto;padding:26px;}
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="nav">
  <div class="wrap nav__in">
    <a href="index.html" class="nav__logo">BNI</a>
    <nav class="nav__menu">
      <a href="index.html">Training Home</a>
      <a href="schedule.html">Schedule</a>
      <a href="news.html" class="active">News</a>
    </nav>
    <div class="nav__right">
      <a href="#" class="nav__login">Login</a>
      <a href="#" class="nav__cta">Register</a>
    </div>
  </div>
</header>

<!-- ===== Title ===== -->
<section class="wrap" style="padding:48px 24px 8px;">
  <p class="text-red font-bold tracking-widest uppercase text-sm mb-2">News</p>
  <h1 class="text-3xl md:text-4xl font-extrabold">내셔널 오피스 공지사항</h1>
  <p class="text-body mt-3">공지 확인부터 자유로운 소통까지 — 유저와 내셔널 오피스가 함께하는 게시판입니다.</p>
</section>

<!-- ===== Board ===== -->
<section class="wrap" style="padding:20px 24px 70px;">

  <!-- toolbar -->
  <div class="flex flex-wrap items-center gap-3 mb-5">
    <div id="tabs" class="flex flex-wrap gap-1"></div>
    <div class="ml-auto flex items-center gap-3">
      <div class="relative">
        <span class="material-symbols-outlined" style="position:absolute;left:10px;top:9px;color:#9aa0a8;font-size:20px;">search</span>
        <input id="search" class="inp" style="width:200px;padding-left:38px;" placeholder="제목·내용 검색"/>
      </div>
      <button id="writeBtn" class="btn-red"><span class="material-symbols-outlined" style="font-size:18px;">edit</span> 글쓰기</button>
    </div>
  </div>

  <!-- role switch -->
  <div class="flex items-center gap-3 mb-4 text-sm">
    <span class="text-body">현재 권한</span>
    <div class="seg" id="roleSeg">
      <button data-role="user" class="on">유저</button>
      <button data-role="admin">어드민 (내셔널 오피스)</button>
    </div>
    <span id="roleHint" class="text-body" style="font-size:12px;"></span>
  </div>

  <!-- list view -->
  <div id="listView">
    <table class="board">
      <thead>
        <tr>
          <th style="width:96px;">구분</th>
          <th>제목</th>
          <th style="width:130px;" class="hidden sm:table-cell">작성자</th>
          <th style="width:108px;" class="hidden sm:table-cell">날짜</th>
          <th style="width:70px;" class="hidden sm:table-cell">조회</th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
    <p id="emptyMsg" class="text-center text-body py-16 hidden">게시글이 없습니다.</p>
  </div>

  <!-- detail view -->
  <div id="detailView" class="hidden"></div>
</section>

<!-- ===== Write modal ===== -->
<div class="modalbg" id="writeModal">
  <div class="modalbox">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-xl font-extrabold">글쓰기</h3>
      <button id="writeClose" class="material-symbols-outlined" style="border:none;background:#f1f3f4;border-radius:50%;width:34px;height:34px;cursor:pointer;color:#5f6368;">close</button>
    </div>
    <div class="space-y-3">
      <div class="flex gap-3">
        <select id="wCat" class="inp" style="width:160px;"></select>
        <input id="wAuthor" class="inp" placeholder="작성자 이름"/>
      </div>
      <input id="wTitle" class="inp" placeholder="제목"/>
      <textarea id="wBody" class="inp" rows="7" placeholder="내용을 입력하세요"></textarea>
      <label class="flex items-center gap-2 text-sm text-body"><input type="checkbox" id="wSecret"/> 비밀글 (작성자/어드민만 열람)</label>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button id="writeCancel" class="btn-line">취소</button>
      <button id="writeSubmit" class="btn-red">등록</button>
    </div>
  </div>
</div>

<script>
  // ===== state =====
  const KEY='bni_news_v1';
  let role='user';            // 'user' | 'admin'
  let filter='all';
  let query='';
  let posts=[];

  const CATS=[['all','전체'],['공지','공지'],['이벤트','이벤트'],['자유','자유게시판'],['Q&A','Q&A']];
  const catLabel={'공지':'공지','이벤트':'이벤트','자유':'자유게시판','Q&A':'Q&A'};
  const catCls={'공지':'bg-red text-white','이벤트':'bg-amber-100 text-amber-700','자유':'bg-blue-100 text-blue-700','Q&A':'bg-violet-100 text-violet-700'};
  const avColor={admin:'#cf2030',user:'#5b6168'};

  function seed(){
    return [
      {id:1,cat:'공지',title:'비지터 초대 노하우 전격 공개!!',author:'내셔널 오피스',role:'admin',date:'2026-06-19',pinned:true,views:342,likes:18,secret:false,
        body:'비지터 초대 성공률을 높이는 5가지 핵심 노하우를 정리했습니다. 첫째, 명확한 가치 제안. 둘째, 일정 사전 공유. 셋째, 후속 리마인드. 자세한 내용은 첨부 가이드를 참고해 주세요.',
        comments:[{author:'김멤버',role:'user',date:'2026-06-19',text:'좋은 정보 감사합니다! 바로 적용해볼게요.'},{author:'내셔널 오피스',role:'admin',date:'2026-06-19',text:'도움이 되었다니 기쁩니다. 추가 질문은 언제든 댓글로 남겨주세요 :)'}]},
      {id:2,cat:'이벤트',title:'2026 내셔널 컨퍼런스 기간 한정 비지터 특별 혜택!',author:'내셔널 오피스',role:'admin',date:'2026-06-10',pinned:true,views:521,likes:33,secret:false,
        body:'2026 내셔널 컨퍼런스 기간 동안 비지터로 참여하시는 분들께 특별 등록 혜택을 제공합니다. 선착순 마감되니 서둘러 신청해 주세요.',
        comments:[]},
      {id:3,cat:'공지',title:'2026년 6월 트레이닝 마감 일정 안내',author:'내셔널 오피스',role:'admin',date:'2026-06-05',pinned:false,views:289,likes:7,secret:false,
        body:'6월 트레이닝 신청 마감 일정을 안내드립니다. 각 챕터별 마감일이 상이하니 Schedule 페이지에서 확인 후 신청해 주세요.',
        comments:[{author:'박디렉터',role:'user',date:'2026-06-05',text:'마감일 확인했습니다. 공유 감사합니다.'}]},
      {id:4,cat:'공지',title:'내셔널 컨퍼런스 개최에 따른 고객센터 응대 지연 안내 (6/1)',author:'내셔널 오피스',role:'admin',date:'2026-06-01',pinned:false,views:174,likes:3,secret:false,
        body:'내셔널 컨퍼런스 준비 기간 동안 고객센터 응대가 평소보다 지연될 수 있습니다. 양해 부탁드립니다.',
        comments:[]},
      {id:5,cat:'Q&A',title:'트레이닝 신청은 어디서 하나요?',author:'이방문',role:'user',date:'2026-05-30',pinned:false,views:96,likes:1,secret:false,
        body:'BNI 트레이닝에 처음 참여하려고 합니다. 신청은 어디서 할 수 있을까요?',
        comments:[{author:'내셔널 오피스',role:'admin',date:'2026-05-30',text:'안녕하세요! 상단 메뉴의 Schedule 페이지에서 원하는 날짜를 선택해 신청하실 수 있습니다.'}]},
      {id:6,cat:'자유',title:'첫 챕터 미팅 후기 남깁니다 :)',author:'최멤버',role:'user',date:'2026-05-28',pinned:false,views:142,likes:9,secret:false,
        body:'지난주 처음으로 챕터 미팅에 참여했는데 분위기가 정말 좋았어요. 다음 주에도 참석하려고 합니다!',
        comments:[{author:'정멤버',role:'user',date:'2026-05-28',text:'저도 다음주에 가요! 후기 감사합니다 :)'}]},
    ];
  }

  function load(){ try{posts=JSON.parse(localStorage.getItem(KEY));}catch(e){posts=null;} if(!Array.isArray(posts)||!posts.length){posts=seed();save();} }
  function save(){ localStorage.setItem(KEY,JSON.stringify(posts)); }
  function nextId(){ return posts.reduce((m,p)=>Math.max(m,p.id),0)+1; }
  function fmtD(iso){ return iso.replace(/-/g,'.'); }
  function todayISO(){ const d=new Date(); const z=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`; }
  function badge(cat){ return `<span class="px-2 py-0.5 rounded-full text-[11px] font-bold ${catCls[cat]||'bg-soft text-body'}">${catLabel[cat]||cat}</span>`; }
  function canSee(p){ return !p.secret || role==='admin'; }

  // ===== tabs =====
  function renderTabs(){
    document.getElementById('tabs').innerHTML = CATS.map(([k,l])=>`<span class="tab ${filter===k?'on':''}" data-k="${k}">${l}</span>`).join('');
  }

  // ===== list =====
  function renderList(){
    const body=document.getElementById('listBody');
    let list=posts.filter(p=> (filter==='all'||p.cat===filter));
    if(query){ const q=query.toLowerCase(); list=list.filter(p=> (p.title+p.body).toLowerCase().includes(q)); }
    list.sort((a,b)=> (b.pinned-a.pinned) || (b.date<a.date?-1:b.date>a.date?1:0) || (b.id-a.id));
    document.getElementById('emptyMsg').classList.toggle('hidden', list.length>0);
    body.innerHTML=list.map(p=>{
      const secret = p.secret && role!=='admin';
      const title = secret ? '<span class="material-symbols-outlined" style="font-size:16px;color:#9aa0a8;">lock</span> 비밀글입니다.' : (p.pinned?'<b style="color:#e11b2b;margin-right:4px;">[고정]</b>':'')+escapeHtml(p.title);
      const cmt = p.comments.length?` <span style="color:#e11b2b;font-weight:700;">[${p.comments.length}]</span>`:'';
      return `<tr class="row ${p.pinned?'pin':''}" data-id="${p.id}">
        <td>${badge(p.cat)}</td>
        <td class="ttl">${title}${secret?'':cmt}</td>
        <td class="hidden sm:table-cell">${escapeHtml(p.author)}${p.role==='admin'?' <span class="text-[10px] font-bold text-red">ADMIN</span>':''}</td>
        <td class="hidden sm:table-cell">${fmtD(p.date)}</td>
        <td class="hidden sm:table-cell">${p.views}</td>
      </tr>`;
    }).join('');
  }

  // ===== detail =====
  function openPost(id){
    const p=posts.find(x=>x.id===id); if(!p) return;
    if(p.secret && role!=='admin'){ alert('비밀글입니다. 어드민만 열람할 수 있습니다.'); return; }
    p.views++; save();
    renderDetail(p);
    document.getElementById('listView').classList.add('hidden');
    const dv=document.getElementById('detailView'); dv.classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function renderDetail(p){
    const adminCtl = role==='admin' ? `
      <button class="btn-line" data-act="pin">${p.pinned?'고정 해제':'상단 고정'}</button>
      <button class="btn-line" data-act="del" style="color:#cf2030;border-color:#f1c0c4;">삭제</button>` : '';
    const cmts = p.comments.map((c,i)=>`
      <div class="cmt">
        <div class="cmt__av" style="background:${avColor[c.role]||'#5b6168'};">${escapeHtml(c.author.slice(0,1))}</div>
        <div style="flex:1;">
          <div class="flex items-center gap-2">
            <b style="font-size:14px;">${escapeHtml(c.author)}</b>
            ${c.role==='admin'?'<span class="text-[10px] font-bold text-white bg-red px-1.5 py-0.5 rounded">내셔널 오피스</span>':''}
            <span class="text-body" style="font-size:12px;">${fmtD(c.date)}</span>
            ${role==='admin'?`<button class="ml-auto text-body" style="font-size:12px;border:none;background:none;cursor:pointer;" data-delc="${i}">삭제</button>`:''}
          </div>
          <p class="mt-1" style="font-size:14px;color:#3c4043;white-space:pre-wrap;">${escapeHtml(c.text)}</p>
        </div>
      </div>`).join('') || '<p class="text-body text-sm py-6 text-center">첫 댓글을 남겨보세요.</p>';

    document.getElementById('detailView').innerHTML=`
      <button id="backBtn" class="btn-line mb-5">← 목록</button>
      <div class="flex items-center gap-2 mb-3">${badge(p.cat)} ${p.pinned?'<span class="text-[11px] font-bold text-red">[고정]</span>':''}</div>
      <h2 class="text-2xl md:text-3xl font-extrabold leading-snug">${escapeHtml(p.title)}</h2>
      <div class="flex items-center gap-3 mt-4 pb-5 border-b border-line text-sm text-body">
        <span class="font-bold text-ink">${escapeHtml(p.author)}</span>
        ${p.role==='admin'?'<span class="text-[10px] font-bold text-white bg-red px-1.5 py-0.5 rounded">ADMIN</span>':''}
        <span>${fmtD(p.date)}</span><span>· 조회 ${p.views}</span><span>· 좋아요 ${p.likes}</span>
        <span class="ml-auto flex gap-2">${adminCtl}</span>
      </div>
      <div class="py-7" style="font-size:15px;line-height:1.8;color:#3c4043;white-space:pre-wrap;">${escapeHtml(p.body)}</div>
      <div class="text-center pb-8 border-b border-line">
        <button id="likeBtn" class="btn-line"><span class="material-symbols-outlined" style="font-size:18px;color:#e11b2b;">favorite</span> 좋아요 ${p.likes}</button>
      </div>
      <h3 class="font-extrabold mt-8 mb-2">댓글 <span class="text-red">${p.comments.length}</span></h3>
      <div id="cmtList">${cmts}</div>
      <div class="mt-5 bg-soft rounded-2xl p-4">
        <div class="flex gap-2 mb-2">
          <input id="cAuthor" class="inp" style="max-width:180px;" value="${role==='admin'?'내셔널 오피스':'방문자'}"/>
          <span class="text-body" style="font-size:12px;align-self:center;">${role==='admin'?'어드민으로 작성':'유저로 작성'}</span>
        </div>
        <textarea id="cText" class="inp" rows="3" placeholder="따뜻한 댓글로 함께 소통해요"></textarea>
        <div class="text-right mt-2"><button id="cSubmit" class="btn-red">댓글 등록</button></div>
      </div>`;

    document.getElementById('backBtn').onclick=showList;
    document.getElementById('likeBtn').onclick=()=>{ p.likes++; save(); renderDetail(p); };
    document.getElementById('cSubmit').onclick=()=>{
      const t=document.getElementById('cText').value.trim();
      const a=document.getElementById('cAuthor').value.trim()||(role==='admin'?'내셔널 오피스':'방문자');
      if(!t){ alert('댓글 내용을 입력하세요.'); return; }
      p.comments.push({author:a,role,date:todayISO(),text:t}); save(); renderDetail(p);
    };
    document.querySelectorAll('#detailView [data-delc]').forEach(b=>b.onclick=()=>{ if(confirm('댓글을 삭제할까요?')){ p.comments.splice(+b.dataset.delc,1); save(); renderDetail(p); } });
    const pinB=document.querySelector('#detailView [data-act="pin"]'); if(pinB) pinB.onclick=()=>{ p.pinned=!p.pinned; save(); renderDetail(p); };
    const delB=document.querySelector('#detailView [data-act="del"]'); if(delB) delB.onclick=()=>{ if(confirm('게시글을 삭제할까요?')){ posts=posts.filter(x=>x.id!==p.id); save(); showList(); } };
  }

  function showList(){ document.getElementById('detailView').classList.add('hidden'); document.getElementById('listView').classList.remove('hidden'); renderList(); }

  // ===== write =====
  function openWrite(){
    const sel=document.getElementById('wCat');
    const opts = role==='admin' ? [['공지','공지'],['이벤트','이벤트'],['자유','자유게시판'],['Q&A','Q&A']]
                                 : [['자유','자유게시판'],['Q&A','Q&A']];
    sel.innerHTML=opts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
    document.getElementById('wAuthor').value = role==='admin'?'내셔널 오피스':'';
    document.getElementById('wTitle').value=''; document.getElementById('wBody').value=''; document.getElementById('wSecret').checked=false;
    document.getElementById('writeModal').classList.add('open');
  }
  function submitWrite(){
    const cat=document.getElementById('wCat').value;
    const author=document.getElementById('wAuthor').value.trim()||(role==='admin'?'내셔널 오피스':'방문자');
    const title=document.getElementById('wTitle').value.trim();
    const body=document.getElementById('wBody').value.trim();
    if(!title){ alert('제목을 입력하세요.'); return; }
    if(!body){ alert('내용을 입력하세요.'); return; }
    posts.push({id:nextId(),cat,title,author,role,date:todayISO(),pinned:false,views:0,likes:0,secret:document.getElementById('wSecret').checked,body,comments:[]});
    save();
    document.getElementById('writeModal').classList.remove('open');
    filter='all'; renderTabs(); renderList();
  }

  // ===== role =====
  function setRole(r){
    role=r;
    document.querySelectorAll('#roleSeg button').forEach(b=>b.classList.toggle('on', b.dataset.role===r));
    document.getElementById('roleHint').textContent = r==='admin'
      ? '· 공지/이벤트 작성, 상단 고정, 글·댓글 삭제, 비밀글 열람 가능'
      : '· 자유게시판·Q&A 작성, 댓글 작성 가능';
    if(!document.getElementById('detailView').classList.contains('hidden')){ showList(); } else { renderList(); }
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ===== events =====
  document.getElementById('tabs').addEventListener('click',e=>{ const t=e.target.closest('.tab'); if(!t)return; filter=t.dataset.k; renderTabs(); renderList(); });
  document.getElementById('listBody').addEventListener('click',e=>{ const r=e.target.closest('tr.row'); if(r) openPost(+r.dataset.id); });
  document.getElementById('search').addEventListener('input',e=>{ query=e.target.value.trim(); renderList(); });
  document.getElementById('roleSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) setRole(b.dataset.role); });
  document.getElementById('writeBtn').onclick=openWrite;
  document.getElementById('writeClose').onclick=()=>document.getElementById('writeModal').classList.remove('open');
  document.getElementById('writeCancel').onclick=()=>document.getElementById('writeModal').classList.remove('open');
  document.getElementById('writeSubmit').onclick=submitWrite;
  document.getElementById('writeModal').addEventListener('click',e=>{ if(e.target.id==='writeModal') e.currentTarget.classList.remove('open'); });

  // ===== init =====
  load(); renderTabs(); renderList(); setRole('user');
</script>
</body>
</html>
